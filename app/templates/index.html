<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Hotel</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Hotel</a>

        <div class="navbar-nav">
            <a class="nav-link {% if request.endpoint=='empleados' %}active{% endif %}" href="/empleados">
                Empleados
            </a>
            <a class="nav-link {% if request.endpoint=='huespedes' %}active{% endif %}" href="/huespedes">
                Huéspedes
            </a>
            <a class="nav-link {% if request.endpoint=='reservaciones' %}active{% endif %}" href="/reservaciones">
                Reservaciones
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1055">

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="toast align-items-center text-bg-{{ category }} border-0 mb-2"
           role="alert"
           aria-live="assertive"
           aria-atomic="true"
           data-bs-delay="2000">

        <div class="d-flex">
          <div class="toast-body">
            {{ message }}
          </div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto"
                  data-bs-dismiss="toast"></button>
        </div>

      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll('.toast').forEach(toastEl => {
        const toast = new bootstrap.Toast(toastEl, {
            delay: 2000
        });
        toast.show();
    });
});
</script>
</body>
</html>
