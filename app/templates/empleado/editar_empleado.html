{% extends "index.html" %}
{% block content %}
<div class="card bg-white border-secondary mb-2">
    <div class="card-header bg-black border-secondary text-white fw-semibold">
        Editar Empleado
    </div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('editar_empleado', id=empleado.id_empleado) }}" class="row g-3">
            <div class="col-md-4">
                <label class="form-label text-muted mb-1 fw-semibold">
                    Nombre
                </label>

                <input type="text" name="nombre" class="form-control bg-light border-secondary text-black"
                    value="{{ empleado.nombre or 'Sin asignar' }}" required minlength="3">
            </div>
            <div class="col-md-4">
                <label class="form-label text-muted mb-1 fw-semibold">
                    Puesto
                </label>
                <select name="puesto" class="form-select bg-light border-secondary text-black" required>
                    <option value="Recepcionista" {% if empleado.puesto=='Recepcionista' %}selected{% endif %}>
                        Recepcionista
                    </option>

                    <option value="Mantenimiento" {% if empleado.puesto=='Mantenimiento' %}selected{% endif %}>
                        Mantenimiento
                    </option>

                    <option value="Bar" {% if empleado.puesto=='Bar' %}selected{% endif %}>
                        Bar
                    </option>

                    <option value="Lavandería" {% if empleado.puesto=='Lavandería' %}selected{% endif %}>
                        Lavandería
                    </option>

                    <option value="Gerente" {% if empleado.puesto=='Gerente' %}selected{% endif %}>
                        Gerente
                    </option>

                </select>
            </div>
            <div class="col-md-4 d-flex align-items-end gap-2">
                <button class="btn btn-dark text-white w-100 fw-semibold border-secondary">
                    <i class="fa-solid fa-floppy-disk me-1"></i>
                    Actualizar
                </button>
                <a href="{{ url_for('empleados') }}" class="btn btn-outline-secondary w-100 fw-semibold">
                    <i class="fa-solid fa-xmark me-1"></i>
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
