{% extends "index.html" %}
{% block content %}

<div class="card">
    <div class="card-header bg-warning text-dark">
        Editar Huésped
    </div>

    <div class="card-body">
        <form method="post" class="row g-3">

            <div class="col-md-4">
                <label class="form-label">Nombre</label>
                <input type="text" name="nombre" class="form-control"
                       value="{{ huesped.nombre }}" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Apellido Paterno</label>
                <input type="text" name="apellidoP" class="form-control"
                       value="{{ huesped.apellidoP }}" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Apellido Materno</label>
                <input type="text" name="apellidoM" class="form-control"
                       value="{{ huesped.apellidoM }}" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Identificación</label>
                <input type="text" name="identificacion" class="form-control"
                       value="{{ huesped.identificacion }}"
                       required minlength="5">
            </div>

            <div class="col-md-4">
                <label class="form-label">Correo electrónico</label>
                <input type="email" name="email" class="form-control"
                       value="{{ huesped.email }}" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Teléfono</label>
                <input type="tel" name="telefono" class="form-control"
                       value="{{ huesped.telefono }}"
                       pattern="[0-9]{8,15}" required>
            </div>

            <div class="col-12">
                <button class="btn btn-primary">Actualizar</button>
                <a href="/huespedes" class="btn btn-secondary">Cancelar</a>
            </div>

        </form>
    </div>
</div>

{% endblock %}
