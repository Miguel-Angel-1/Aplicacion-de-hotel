<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Simple Mejorado</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #87CEEB;
        }

        canvas {
            display: block;
        }

        #fps {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 18px;
            z-index: 100;
        }

        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            z-index: 100;
            pointer-events: none;
        }

        #crosshair::before,
        #crosshair::after {
            content: "";
            position: absolute;
            background: white;
        }

        #crosshair::before {
            width: 20px;
            height: 2px;
            top: 9px;
        }

        #crosshair::after {
            width: 2px;
            height: 20px;
            left: 9px;
        }

        #menu {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #menuBox {
            background: #222;
            color: white;
            padding: 30px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .active {
            background: #4CAF50;
            color: white;
        }

        .inactive {
            background: #555;
            color: white;
        }
    </style>
</head>

<body>

    <div id="fps">FPS: 0</div>

    <div id="crosshair"></div>

    <div id="menu">

        <div id="menuBox">

            <h2>MENÚ</h2>

            <button id="survivalBtn" class="active">
                Modo Colisiones
            </button>

            <button id="creativeBtn" class="inactive">
                Modo Volar / Sin Colisión
            </button>

            <button id="controlsBtn">
                Controles
            </button>

            <button id="resumeBtn">
                Continuar
            </button>

        </div>

    </div>

    <script type="module">

        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';



        // ================= ESCENA =================

        const scene = new THREE.Scene();

        scene.background = new THREE.Color(0x87CEEB);

        scene.fog = new THREE.Fog(0x87CEEB, 35, 90);

        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );

        const renderer = new THREE.WebGLRenderer({
            antialias: true
        });

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

        renderer.shadowMap.enabled = true;

        renderer.shadowMap.type =
            THREE.PCFSoftShadowMap;

        renderer.setPixelRatio(1);

        renderer.outputColorSpace =
            THREE.SRGBColorSpace;

        document.body.appendChild(
            renderer.domElement
        );



        // ================= LUCES =================

        const sun = new THREE.DirectionalLight(
            0xffffff,
            1.2
        );

        sun.position.set(60, 120, 40);

        sun.castShadow = true;

        sun.shadow.mapSize.width = 512;
        sun.shadow.mapSize.height = 512;

        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far = 300;

        sun.shadow.camera.left = -120;
        sun.shadow.camera.right = 120;
        sun.shadow.camera.top = 120;
        sun.shadow.camera.bottom = -120;

        scene.add(sun);

        const ambient =
            new THREE.AmbientLight(
                0xffffff,
                0.45
            );

        scene.add(ambient);



        // ================= MUNDO =================

        const blocks = [];

        const grassMat =
            new THREE.MeshStandardMaterial({
                color: 0x55aa55
            });

        const dirtMat =
            new THREE.MeshStandardMaterial({
                color: 0x8b5a2b
            });

        const blockGeo =
            new THREE.BoxGeometry(1, 1, 1);

        function createBlock(x, y, z, mat) {

            const block =
                new THREE.Mesh(blockGeo, mat);

            block.position.set(x, y, z);
            if (y <= 1) {

                block.castShadow = true;

                block.receiveShadow = true;
            }

            scene.add(block);

            blocks.push(block);
        }

        for (let x = 0; x < 100; x++) {

            for (let z = 0; z < 100; z++) {

                createBlock(
                    x,
                    0,
                    z,
                    grassMat
                );

                if (Math.random() < 0.03) {

                    const h =
                        Math.floor(Math.random() * 4) + 1;

                    for (let y = 1; y < h; y++) {

                        createBlock(
                            x,
                            y,
                            z,
                            dirtMat
                        );
                    }
                }
            }
        }



        // ================= SLIMES =================

        const slimes = [];

        function createSlime(x, z, size, color) {

            const slime =
                new THREE.Mesh(

                    new THREE.SphereGeometry(
                        size,
                        10,
                        10
                    ),

                    new THREE.MeshPhysicalMaterial({

                        color: color,

                        transparent: true,

                        opacity: 0.8,

                        roughness: 0.2,

                        transmission: 0.3
                    })
                );

            slime.position.set(
                x,
                size,
                z
            );

            slime.castShadow = true;

            scene.add(slime);

            slimes.push({

                mesh: slime,

                bounce: Math.random() * 5,

                size: size
            });
        }

        createSlime(40, 40, 1, 0x55ff55);

        createSlime(60, 50, 1.3, 0x66ff88);



        // ================= JUGADOR =================

        camera.position.set(50, 7, 50);

        const player = {

            height: 1.7,

            speed: 0.24,

            runSpeed: 0.34,

            flySpeed: 0.50,

            velocityY: 0,

            gravity: 0.050,

            jump: 0.30,

            onGround: false,

            fly: false,

            noclip: false
        };



        // ================= MANO =================

        const hand =
            new THREE.Mesh(

                new THREE.BoxGeometry(
                    0.22,
                    0.42,
                    0.16
                ),

                new THREE.MeshLambertMaterial({
                    color: 0xd59a6a
                })
            );

        hand.position.set(
            0.78,
            -0.58,
            -0.72
        );

        hand.rotation.set(
            THREE.MathUtils.degToRad(18),
            THREE.MathUtils.degToRad(-8),
            THREE.MathUtils.degToRad(5)
        );

        camera.add(hand);

        scene.add(camera);



        // ================= CONTROLES =================

        const keys = {};

        document.addEventListener(
            "keydown",
            e => {

                keys[e.key.toLowerCase()] = true;
            }
        );

        document.addEventListener(
            "keyup",
            e => {

                keys[e.key.toLowerCase()] = false;
            }
        );



        // ================= MOUSE =================

        let yaw = 0;
        let pitch = 0;

        document.body.addEventListener(
            "click",
            () => {

                if (menu.style.display !== "flex") {

                    document.body.requestPointerLock();
                }
            }
        );

        document.addEventListener(
            "mousemove",
            e => {

                if (
                    document.pointerLockElement
                    === document.body
                ) {

                    yaw -= e.movementX * 0.002;

                    pitch -= e.movementY * 0.002;

                    pitch = Math.max(
                        -Math.PI / 2,
                        Math.min(Math.PI / 2, pitch)
                    );

                    camera.rotation.order = "YXZ";

                    camera.rotation.y = yaw;

                    camera.rotation.x = pitch;
                }
            }
        );



        // ================= MENU =================

        const menu =
            document.getElementById("menu");

        document.addEventListener(
            "keydown",
            e => {

                if (e.key === "Escape") {

                    if (menu.style.display === "flex") {

                        menu.style.display = "none";

                        document.body.requestPointerLock();

                    } else {

                        menu.style.display = "flex";

                        document.exitPointerLock();
                    }
                }
            }
        );

        const survivalBtn =
            document.getElementById(
                "survivalBtn"
            );

        const creativeBtn =
            document.getElementById(
                "creativeBtn"
            );

        const controlsBtn =
            document.getElementById(
                "controlsBtn"
            );

        const resumeBtn =
            document.getElementById(
                "resumeBtn"
            );

        survivalBtn.onclick = () => {

            player.noclip = false;

            survivalBtn.className = "active";

            creativeBtn.className = "inactive";
        };

        creativeBtn.onclick = () => {

            player.noclip = true;

            creativeBtn.className = "active";

            survivalBtn.className = "inactive";
        };

        controlsBtn.onclick = () => {

            alert(
                `WASD = mover

SHIFT = correr

ESPACIO = saltar

DOBLE ESPACIO = volar

SHIFT + VOLAR = bajar

ESC = menú`
            );
        };

        resumeBtn.onclick = () => {

            menu.style.display = "none";

            document.body.requestPointerLock();
        };



        // ================= DOBLE ESPACIO =================

        let lastSpace = 0;

        document.addEventListener(
            "keydown",
            e => {

                if (e.code === "Space") {

                    const now = Date.now();

                    if (
                        now - lastSpace < 280
                        &&
                        !player.noclip
                    ) {

                        player.fly = !player.fly;

                        player.velocityY = 0;
                    }

                    lastSpace = now;
                }
            }
        );



        // ================= COLISIONES =================

        function collides(x, y, z) {

            for (const block of blocks) {

                const bx = block.position.x;
                const by = block.position.y;
                const bz = block.position.z;

                if (
                    x > bx - 0.8 &&
                    x < bx + 0.8 &&
                    y - 1.8 < by + 0.5 &&
                    y > by - 0.5 &&
                    z > bz - 0.8 &&
                    z < bz + 0.8
                ) {
                    return true;
                }
            }

            return false;
        }



        // ================= MOVIMIENTO =================

        function updatePlayer() {

            let speed =
                player.speed;

            if (keys["shift"]) {

                speed = player.runSpeed;
            }

            if (player.fly || player.noclip) {

                speed = player.flySpeed;
            }

            const forward =
                new THREE.Vector3(
                    Math.sin(yaw),
                    0,
                    Math.cos(yaw)
                );

            const right =
                new THREE.Vector3(
                    Math.sin(yaw - Math.PI / 2),
                    0,
                    Math.cos(yaw - Math.PI / 2)
                );

            let moveX = 0;
            let moveZ = 0;

            if (keys["w"]) {

                moveX -= forward.x * speed;
                moveZ -= forward.z * speed;
            }

            if (keys["s"]) {

                moveX += forward.x * speed;
                moveZ += forward.z * speed;
            }

            if (keys["a"]) {

                moveX += right.x * speed;
                moveZ += right.z * speed;
            }

            if (keys["d"]) {

                moveX -= right.x * speed;
                moveZ -= right.z * speed;
            }

            // ================= NOCLIP =================

            if (player.noclip) {

                camera.position.x += moveX;
                camera.position.z += moveZ;

                if (keys[" "]) {
                    camera.position.y += speed;
                }

                if (keys["shift"]) {
                    camera.position.y -= speed;
                }

                return;
            }

            // ================= COLISIONES =================

            if (!collides(
                camera.position.x + moveX,
                camera.position.y,
                camera.position.z
            )) {
                camera.position.x += moveX;
            }

            if (!collides(
                camera.position.x,
                camera.position.y,
                camera.position.z + moveZ
            )) {
                camera.position.z += moveZ;
            }

            // ================= VOLAR =================

            if (player.fly) {

                player.velocityY = 0;

                if (keys[" "]) {
                    camera.position.y += speed;
                }

                if (keys["shift"]) {
                    camera.position.y -= speed;
                }

                return;
            }

            // ================= GRAVEDAD =================

            player.velocityY -=
                player.gravity;

            const nextY =
                camera.position.y +
                player.velocityY;

            if (!collides(
                camera.position.x,
                nextY,
                camera.position.z
            )) {

                camera.position.y = nextY;

                player.onGround = false;

            } else {

                if (player.velocityY < 0) {

                    player.onGround = true;
                }

                player.velocityY = 0;
            }

            if (camera.position.y <= player.height) {

                camera.position.y =
                    player.height;

                player.velocityY = 0;

                player.onGround = true;
            }

            // ================= SALTO =================

            if (
                keys[" "]
                &&
                player.onGround
                &&
                !player.fly
            ) {

                player.velocityY =
                    player.jump;

                player.onGround = false;
            }
        }



        // ================= FPS =================

        const fpsElement =
            document.getElementById("fps");

        let frameTimes = [];
        let lastFPSUpdate = 0;

        function updateFPS() {

            const now = performance.now();

            frameTimes.push(now);

            while (
                frameTimes.length > 0
                &&
                frameTimes[0] <= now - 1000
            ) {
                frameTimes.shift();
            }

            if (now - lastFPSUpdate > 250) {

                fpsElement.innerText =
                    `FPS: ${frameTimes.length}`;

                lastFPSUpdate = now;
            }
        }



        // ================= SLIMES =================

        function updateSlimes() {

            for (const slime of slimes) {

                slime.bounce += 0.05;

                const s = slime.mesh;

                const scale =
                    1 +
                    Math.sin(slime.bounce)
                    * 0.04;

                s.scale.x = scale;

                s.scale.z = scale;

                s.scale.y = 1 / scale;

                s.position.y =
                    slime.size +
                    Math.abs(
                        Math.sin(slime.bounce)
                    ) * 0.08;
            }
        }



        // ================= ANIMACION =================

        let lastFrame = 0;

        const targetFPS = 60;

        const frameDelay = 1000 / targetFPS;

        function animate(now = 0) {

            requestAnimationFrame(animate);

            const delta = now - lastFrame;

            if (delta < frameDelay) {
                return;
            }

            lastFrame = now;

            updatePlayer();

            updateSlimes();

            renderer.render(scene, camera);

            updateFPS();
        }

        animate();



        // ================= RESIZE =================

        window.addEventListener(
            "resize",
            () => {

                camera.aspect =
                    window.innerWidth /
                    window.innerHeight;

                camera.updateProjectionMatrix();

                renderer.setSize(
                    window.innerWidth,
                    window.innerHeight
                );
            }
        );

    </script>
</body>

</html>
